name: Auto Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap React app if package.json missing
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json — bootstrapping Create React App..."
            npx create-react-app@latest temp-app --template cra-template
            cp -r temp-app/public ./public
            cp -r temp-app/src ./src-cra
            cp temp-app/package.json ./package.json
            rm -rf temp-app

            # Copy default CRA src first (keeps index.js entry point intact)
            cp -r src-cra ./src
            rm -rf src-cra

            # index.jsx is the user's component — use it as App.js
            # CRA's src/index.js already imports <App /> so this just works
            if [ -f index.jsx ]; then
              echo "Found index.jsx — using as src/App.js"
              cp index.jsx src/App.js
            elif [ -f App.jsx ]; then
              echo "Found App.jsx — using as src/App.js"
              cp App.jsx src/App.js
            elif [ -f index.js ]; then
              echo "Found index.js — using as src/App.js"
              cp index.js src/App.js
            else
              echo "No component file found — using CRA default App"
            fi

            # Fix: rename the default export to App if it isn't already
            # CRA's src/index.js does: import App from './App'; so export name must be App
            node -e "
              const fs = require('fs');
              let code = fs.readFileSync('src/App.js', 'utf8');
              // Replace any 'export default FunctionName' with 'export default App'
              // and add wrapper if needed
              const match = code.match(/export default function (\w+)/);
              if (match && match[1] !== 'App') {
                code = code.replace('export default function ' + match[1], 'export default function App');
                fs.writeFileSync('src/App.js', code);
                console.log('Renamed export default from', match[1], 'to App');
              } else {
                console.log('Export default is already App or uses arrow syntax — OK');
              }
            "

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json public/ src/
            git commit -m "ci: bootstrap React app [skip ci]"
            git push
          else
            echo "package.json exists — skipping bootstrap"
          fi

      - name: Patch package.json (homepage + gh-pages)
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          HOMEPAGE="https://${OWNER}.github.io/${REPO}"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.homepage = '${HOMEPAGE}';
            pkg.scripts = pkg.scripts || {};
            pkg.scripts.predeploy = 'npm run build';
            pkg.scripts.deploy = 'gh-pages -d build';
            const dev = pkg.devDependencies || {};
            if (!(pkg.dependencies || {})['gh-pages'] && !dev['gh-pages']) {
              pkg.devDependencies = dev;
              pkg.devDependencies['gh-pages'] = '^6.0.0';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Patched homepage ->', pkg.homepage);
          "

      - name: Install dependencies
        run: npm install

      - name: Commit package-lock if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet package.json package-lock.json || (
            git add package.json package-lock.json &&
            git commit -m "ci: update package files [skip ci]" &&
            git push
          )

      - name: Build
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
